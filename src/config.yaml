site:
  name: Creio em Te Senhor
  site: 'https://mentoria.creioemtesenhor.com'
  base: '/'
  trailingSlash: false

metadata:
  title:
    default: 'Oração Diária — Creio em Te Senhor'
    template: '%s — Creio em Te Senhor'
  description: 'Devocional diário, meditações sobre oração e textos bíblicos que fortalecem sua fé no dia a dia.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Creio em Te Senhor
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    cardType: summary_large_image

i18n:
  language: pt-BR
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post:
      isEnabled: false
      permalink: '/%slug%'
      robots:
        index: false
    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: false
    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: false
    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false
    isRelatedPostsEnabled: false
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'light:only'
