<!-- FAVICON SVG: compatível Chrome/Firefox/Safari modernos -->
<!-- Tamanho referência: 32x32px, design simplificado para legibilidade mínima -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  width="32"
  height="32"
>
  <defs>
    <linearGradient id="f-ouro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C06A" />
      <stop offset="100%" style="stop-color:#C9A24B" />
    </linearGradient>
  </defs>

  <!-- Fundo creme suave -->
  <rect width="32" height="32" fill="#FDFBF5" rx="4" />

  <!-- Cruz simplificada, bold para legibilidade em 16x16 -->
  <rect x="13" y="8" width="6" height="20" rx="1" fill="#7A1F3A" />
  <rect x="6" y="13" width="20" height="6" rx="1" fill="#7A1F3A" />

  <!-- Detalhes dourados centrais -->
  <rect x="15" y="8" width="2" height="20" rx="0.5" fill="url(#f-ouro)" opacity="0.6" />
  <rect x="6" y="15" width="20" height="2" rx="0.5" fill="url(#f-ouro)" opacity="0.6" />

  <!-- Flama simplificada no topo -->
  <path
    d="M16 2
       C16 2 19 5 18.5 7.5
       C18 9.5 17 9 16 10
       C15 9 14 9.5 13.5 7.5
       C13 5 16 2 16 2 Z"
    fill="url(#f-ouro)"
  />

</svg>
