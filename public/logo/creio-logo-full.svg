<!-- LOGO COMPLETA: Creio em Te Senhor -->
<!-- Versão FULL: símbolo + wordmark horizontal -->
<!-- Dimensões: 280x60px (header), escalável -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 280 60"
  width="280"
  height="60"
  role="img"
  aria-label="Creio em Te Senhor"
>
  <title>Creio em Te Senhor</title>
  <defs>
    <!-- Gradiente dourado para símbolo -->
    <linearGradient id="grad-ouro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C06A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A24B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8822E;stop-opacity:1" />
    </linearGradient>
    <!-- Gradiente sutil para wordmark -->
    <linearGradient id="grad-bordo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A1F3A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ====== SÍMBOLO: Cruz + Flama ====== -->
  <!-- Cruz base (bordô com borda dourada suave) -->
  <!-- Haste vertical da cruz -->
  <rect x="22" y="8" width="7" height="44" rx="1.5" fill="url(#grad-bordo)" />
  <!-- Haste horizontal da cruz -->
  <rect x="10" y="20" width="31" height="7" rx="1.5" fill="url(#grad-bordo)" />

  <!-- Ornamento dourado: linha fina na haste vertical (detalhe élite) -->
  <rect x="24.5" y="8" width="2" height="44" rx="0.5" fill="url(#grad-ouro)" opacity="0.6" />
  <!-- Ornamento dourado: linha fina na haste horizontal -->
  <rect x="10" y="22.5" width="31" height="2" rx="0.5" fill="url(#grad-ouro)" opacity="0.6" />

  <!-- Flama dourada no topo da cruz -->
  <!-- Flama principal -->
  <path
    d="M25.5 2
       C25.5 2 28 5 27.5 8
       C27 11 26.5 10 25.5 12
       C24.5 10 24 11 23.5 8
       C23 5 25.5 2 25.5 2 Z"
    fill="url(#grad-ouro)"
  />
  <!-- Flama pequena esquerda -->
  <path
    d="M22.5 5
       C22.5 5 20.5 7.5 21 9.5
       C21.3 10.5 22 10 22.5 11
       C22.8 10 23.2 10.2 23.2 9
       C23.2 7 22.5 5 22.5 5 Z"
    fill="url(#grad-ouro)"
    opacity="0.7"
  />
  <!-- Flama pequena direita -->
  <path
    d="M28.5 5
       C28.5 5 30.5 7.5 30 9.5
       C29.7 10.5 29 10 28.5 11
       C28.2 10 27.8 10.2 27.8 9
       C27.8 7 28.5 5 28.5 5 Z"
    fill="url(#grad-ouro)"
    opacity="0.7"
  />

  <!-- Brilho sutil na intersecção da cruz -->
  <circle cx="25.5" cy="23.5" r="4" fill="url(#grad-ouro)" opacity="0.15" />

  <!-- ====== WORDMARK ====== -->
  <!-- "Creio em Te Senhor" em Playfair Display -->
  <!-- Linha 1: CREIO EM TE -->
  <text
    x="52"
    y="26"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="15"
    font-weight="700"
    font-style="italic"
    letter-spacing="2"
    fill="#7A1F3A"
  >CREIO EM TE</text>

  <!-- Linha separadora dourada fina -->
  <rect x="52" y="30" width="180" height="1" rx="0.5" fill="url(#grad-ouro)" opacity="0.8" />

  <!-- Linha 2: SENHOR (destaque maior) -->
  <text
    x="52"
    y="48"
    font-family="'Playfair Display', 'Georgia', serif"
    font-size="22"
    font-weight="700"
    letter-spacing="4"
    fill="#7A1F3A"
  >SENHOR</text>

  <!-- Ornamento dourado: pequenos dots nas laterais do wordmark -->
  <circle cx="52" cy="38" r="1.5" fill="url(#grad-ouro)" />
  <circle cx="232" cy="38" r="1.5" fill="url(#grad-ouro)" />

</svg>
