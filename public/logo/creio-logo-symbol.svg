<!-- SÍMBOLO ISOLADO: Cruz + Flama -->
<!-- Para favicon, ícone de app, uso standalone -->
<!-- Dimensões: 40x40px (header), escalável -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 40 40"
  width="40"
  height="40"
  role="img"
  aria-label="Creio em Te Senhor — símbolo"
>
  <title>Creio em Te Senhor</title>
  <defs>
    <linearGradient id="s-ouro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C06A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A24B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8822E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="s-bordo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A1F3A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cruz: haste vertical -->
  <rect x="17.5" y="9" width="5" height="28" rx="1" fill="url(#s-bordo)" />
  <!-- Cruz: haste horizontal -->
  <rect x="8" y="16" width="24" height="5" rx="1" fill="url(#s-bordo)" />

  <!-- Detalhe dourado vertical -->
  <rect x="19.5" y="9" width="1" height="28" rx="0.5" fill="url(#s-ouro)" opacity="0.7" />
  <!-- Detalhe dourado horizontal -->
  <rect x="8" y="18" width="24" height="1" rx="0.5" fill="url(#s-ouro)" opacity="0.7" />

  <!-- Flama principal -->
  <path
    d="M20 2
       C20 2 23 6 22.5 9.5
       C22 12.5 21 12 20 14
       C19 12 18 12.5 17.5 9.5
       C17 6 20 2 20 2 Z"
    fill="url(#s-ouro)"
  />
  <!-- Flama esquerda -->
  <path
    d="M16.5 5
       C16.5 5 14 8 14.5 10.5
       C14.8 12 15.8 11.5 16.5 13
       C17 11.5 17.5 11.5 17.5 10
       C17.5 7.5 16.5 5 16.5 5 Z"
    fill="url(#s-ouro)"
    opacity="0.65"
  />
  <!-- Flama direita -->
  <path
    d="M23.5 5
       C23.5 5 26 8 25.5 10.5
       C25.2 12 24.2 11.5 23.5 13
       C23 11.5 22.5 11.5 22.5 10
       C22.5 7.5 23.5 5 23.5 5 Z"
    fill="url(#s-ouro)"
    opacity="0.65"
  />

  <!-- Brilho intersecção -->
  <circle cx="20" cy="18.5" r="3" fill="url(#s-ouro)" opacity="0.12" />

</svg>
