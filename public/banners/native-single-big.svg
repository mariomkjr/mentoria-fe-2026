<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="Matéria patrocinada em destaque">
  <defs>
    <linearGradient id="nbig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#831843"/>
      <stop offset="0.6" stop-color="#7A1F3A"/>
      <stop offset="1" stop-color="#5C1729"/>
    </linearGradient>
    <radialGradient id="nbigGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#C9A24B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="820" height="420" fill="#FFFFFF" stroke="#E5DCC5" rx="14"/>

  <!-- Imagem grande -->
  <rect x="0" y="0" width="820" height="260" fill="url(#nbig)" rx="14"/>
  <rect x="0" y="0" width="820" height="260" fill="url(#nbigGlow)" rx="14"/>

  <!-- Cruz decorativa -->
  <g transform="translate(410 130)" opacity="0.28">
    <rect x="-3" y="-60" width="6" height="120" fill="#FDFBF5"/>
    <rect x="-28" y="-30" width="56" height="6" fill="#FDFBF5"/>
  </g>

  <!-- Tag patrocinado -->
  <g transform="translate(24 24)">
    <rect width="140" height="28" rx="14" fill="#C9A24B"/>
    <text x="70" y="19" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0B0B0F">• PATROCINADO</text>
  </g>

  <!-- Categoria -->
  <g transform="translate(24 220)">
    <rect width="120" height="26" rx="4" fill="#FDFBF5" opacity="0.92"/>
    <text x="60" y="18" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#7A1F3A">HISTÓRIA REAL</text>
  </g>

  <!-- Play button -->
  <g transform="translate(780 220)" opacity="0.95">
    <circle r="22" fill="#FDFBF5"/>
    <path d="M-6 -10 L-6 10 L10 0 Z" fill="#7A1F3A"/>
  </g>

  <!-- Conteúdo inferior -->
  <g transform="translate(0 260)">
    <text x="32" y="50" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#0B0B0F">Casado há 23 anos revela o</text>
    <text x="32" y="82" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#0B0B0F">"ritual" simples que ele e a</text>
    <text x="32" y="114" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" fill="#0B0B0F">esposa fazem toda noite</text>
  </g>

  <g transform="translate(32 388)">
    <text x="0" y="14" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#5C5755">historias-do-amor.com.br</text>
    <text x="160" y="14" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9A3A54">· 14 min de leitura</text>

    <rect x="590" y="-8" width="166" height="32" rx="16" fill="#7A1F3A"/>
    <text x="673" y="12" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FDFBF5">Ler a história →</text>
  </g>
</svg>
