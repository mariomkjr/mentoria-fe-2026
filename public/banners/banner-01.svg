<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 140" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Banner Mentoria Fé — transforme seu relacionamento">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A1F3A"/>
      <stop offset="1" stop-color="#5C1729"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A24B"/>
      <stop offset="1" stop-color="#DDB865"/>
    </linearGradient>
    <pattern id="dots1" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#C9A24B" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1140" height="140" fill="url(#bg1)"/>
  <rect width="1140" height="140" fill="url(#dots1)"/>
  <g transform="translate(60 70)">
    <circle r="36" fill="none" stroke="url(#gold1)" stroke-width="2"/>
    <path d="M-14 -2 L0 12 L18 -14" fill="none" stroke="url(#gold1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="140" y="58" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="26" fill="#FDFBF5">Mentoria Fé</text>
  <text x="140" y="92" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#FDFBF5" opacity="0.82">Transforme seu relacionamento segundo a Palavra — 20 ensinos bíblicos.</text>
  <g transform="translate(880 45)">
    <rect width="200" height="50" rx="25" fill="url(#gold1)"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="16" fill="#0B0B0F">Quero Começar →</text>
  </g>
  <text x="1100" y="132" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#FDFBF5" opacity="0.4">placeholder · banner-01</text>
</svg>
