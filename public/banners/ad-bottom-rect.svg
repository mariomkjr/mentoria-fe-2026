<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 250" role="img" aria-label="Espaço publicitário — AdSense Medium Rectangle 300x250 / Billboard">
  <defs>
    <linearGradient id="adrectbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#EFF2F6"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="728" height="250" fill="url(#adrectbg)" rx="8" stroke="#D1D5DB" stroke-dasharray="4 3"/>
  <rect width="728" height="250" fill="url(#grid)" rx="8"/>
  <g transform="translate(348 105)">
