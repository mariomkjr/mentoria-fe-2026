  </g>
  <text x="364" y="135" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Espaço Publicitário</text>
  <text x="364" y="158" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6B7280">Formato responsive · 728×250 / 300×250</text>
  <text x="364" y="178" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9CA3AF" font-style="italic">representação de slot AdSense</text>
  <text x="708" y="240" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#9CA3AF">slot-bottom · placeholder</text>
