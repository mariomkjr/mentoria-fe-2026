<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="Banner Mentoria Fé — última chamada">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C1729"/>
      <stop offset="0.6" stop-color="#7A1F3A"/>
      <stop offset="1" stop-color="#5C1729"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DDB865"/>
      <stop offset="0.5" stop-color="#C9A24B"/>
      <stop offset="1" stop-color="#A8843A"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#DDB865" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#DDB865" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="280" rx="20" fill="url(#bg3)"/>
  <rect width="800" height="280" rx="20" fill="url(#glow3)"/>

  <!-- Linhas decorativas cantos -->
  <path d="M24 24 L60 24 M24 24 L24 60" stroke="url(#gold3)" stroke-width="2" fill="none"/>
  <path d="M776 24 L740 24 M776 24 L776 60" stroke="url(#gold3)" stroke-width="2" fill="none"/>
  <path d="M24 256 L60 256 M24 256 L24 220" stroke="url(#gold3)" stroke-width="2" fill="none"/>
  <path d="M776 256 L740 256 M776 256 L776 220" stroke="url(#gold3)" stroke-width="2" fill="none"/>

  <!-- Cruz estilizada -->
  <g transform="translate(400 72)" opacity="0.9">
    <rect x="-2" y="-24" width="4" height="48" fill="url(#gold3)"/>
    <rect x="-14" y="-10" width="28" height="4" fill="url(#gold3)"/>
  </g>

  <text x="400" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" fill="#DDB865" letter-spacing="5">ÚLTIMA CHAMADA</text>
  <text x="400" y="172" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-weight="700" font-size="32" fill="#FDFBF5">Não adie mais seu próximo passo</text>
  <text x="400" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#FDFBF5" opacity="0.72">Seus filhos herdarão o casamento que você construir hoje.</text>

  <g transform="translate(280 224)">
    <rect width="240" height="42" rx="21" fill="url(#gold3)"/>
    <text x="120" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" fill="#0B0B0F">Entrar Agora →</text>
  </g>
  <text x="780" y="272" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#DDB865" opacity="0.35">placeholder · banner-03</text>
</svg>
