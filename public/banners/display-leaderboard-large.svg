<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 250" role="img" aria-label="Publicidade — Display Billboard 970x250">
  <defs>
    <linearGradient id="dlb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F3F4F6"/>
      <stop offset="0.5" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#D1D5DB"/>
    </pattern>
  </defs>
  <rect width="970" height="250" fill="url(#dlb)" rx="10" stroke="#D1D5DB" stroke-dasharray="6 4"/>
  <rect width="970" height="250" fill="url(#dots)" rx="10" opacity="0.5"/>

  <g transform="translate(485 100)">
    <rect x="-54" y="-22" width="44" height="24" rx="4" fill="#4285F4"/>
    <text x="-32" y="-5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Ads</text>
    <text x="-2" y="-4" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">by Google</text>
  </g>

  <text x="485" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Espaço Publicitário</text>
  <text x="485" y="175" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#4B5563">Display Billboard · 970 × 250</text>
  <text x="485" y="204" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9CA3AF" font-style="italic">slot AdSense / rede de display</text>

  <g opacity="0.6">
    <line x1="40" y1="40" x2="80" y2="40" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="40" y1="40" x2="40" y2="80" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="930" y1="40" x2="890" y2="40" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="930" y1="40" x2="930" y2="80" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="40" y1="210" x2="80" y2="210" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="40" y1="210" x2="40" y2="170" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="930" y1="210" x2="890" y2="210" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="930" y1="210" x2="930" y2="170" stroke="#9CA3AF" stroke-width="2"/>
  </g>
