<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" role="img" aria-label="Matéria recomendada — patrocinado">
  <defs>
    <linearGradient id="hero-thumb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A1F3A"/>
      <stop offset="0.5" stop-color="#9A3A54"/>
      <stop offset="1" stop-color="#5C1729"/>
    </linearGradient>
  </defs>
  <rect width="820" height="240" fill="#FFFFFF" rx="12" stroke="#E5DCC5"/>
  <rect x="0" y="0" width="320" height="240" fill="url(#hero-thumb)" rx="12"/>
  <!-- Cruz decorativa -->
  <g transform="translate(160 120)" opacity="0.30">
    <rect x="-2" y="-46" width="4" height="92" fill="#FFFFFF"/>
    <rect x="-20" y="-22" width="40" height="4" fill="#FFFFFF"/>
  </g>
  <!-- Play triangle subtle -->
  <g transform="translate(290 210)" opacity="0.8">
    <circle r="12" fill="#FFFFFF" opacity="0.9"/>
    <path d="M-3 -5 L-3 5 L5 0 Z" fill="#7A1F3A"/>
  </g>

  <!-- Conteúdo lado direito -->
  <g transform="translate(352 0)">
    <rect x="0" y="28" width="100" height="22" rx="11" fill="#7A1F3A"/>
    <text x="50" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#FDFBF5">PATROCINADO</text>
    <text x="118" y="44" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#9A3A54">Conteúdo do parceiro</text>

    <text x="0" y="82" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#0B0B0F">Marido descobre o hábito que</text>
    <text x="0" y="110" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#0B0B0F">estava matando seu casamento</text>
    <text x="0" y="138" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#0B0B0F">(e ninguém fala sobre isso)</text>

    <text x="0" y="172" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5C5755">Depois de 12 anos de terapia, psicólogo cristão compartilha</text>
    <text x="0" y="192" font-family="Inter, Arial, sans-serif" font-size="14" fill="#5C5755">um método que já transformou mais de 3 mil casais…</text>

    <g transform="translate(0 212)">
      <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#0B0B0F">casamento-renovado.com.br</text>
      <rect x="320" y="-6" width="130" height="30" rx="15" fill="#C9A24B"/>
      <text x="385" y="13" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0B0B0F">Ler artigo →</text>
    </g>
  </g>
</svg>
