<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="Espaço publicitário — Widget nativo MGID/Adskeeper">
  <defs>
    <linearGradient id="cardbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9FAFB"/>
    </linearGradient>
    <linearGradient id="thumb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A1F3A"/>
      <stop offset="1" stop-color="#9A3A54"/>
    </linearGradient>
    <linearGradient id="thumb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="thumb3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="thumb4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="thumb5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="thumb6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#831843"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
  </defs>

  <rect width="800" height="340" fill="#FAFAFA" rx="6"/>

  <!-- Header -->
  <text x="24" y="28" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="2">PATROCINADO · RECOMENDADO PARA VOCÊ</text>
  <text x="776" y="28" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" fill="#9CA3AF">Publicidade MGID/Adskeeper</text>
  <line x1="24" y1="42" x2="776" y2="42" stroke="#E5E7EB" stroke-width="1"/>

  <!-- 6 Cards -->
  <g transform="translate(24 60)">
    <!-- Card 1 -->
    <g>
      <rect width="240" height="250" fill="url(#cardbg)" stroke="#E5E7EB" rx="6"/>
      <rect width="240" height="140" fill="url(#thumb1)" rx="6"/>
      <text x="16" y="168" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Veja o que fazem as esposas</text>
      <text x="16" y="186" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">antes de dormir (incrível!)</text>
      <text x="16" y="214" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6B7280">saudebemestar.com.br · Ad</text>
      <rect x="16" y="226" width="100" height="18" rx="9" fill="#7A1F3A"/>
      <text x="66" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#fff">Saiba Mais →</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(256 0)">
      <rect width="240" height="250" fill="url(#cardbg)" stroke="#E5E7EB" rx="6"/>
      <rect width="240" height="140" fill="url(#thumb2)" rx="6"/>
      <text x="16" y="168" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Pastor revela a oração que</text>
      <text x="16" y="186" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">muda tudo em 7 dias</text>
      <text x="16" y="214" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6B7280">portaldafe.com · Ad</text>
      <rect x="16" y="226" width="100" height="18" rx="9" fill="#7A1F3A"/>
      <text x="66" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#fff">Ver Agora →</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(512 0)">
      <rect width="240" height="250" fill="url(#cardbg)" stroke="#E5E7EB" rx="6"/>
      <rect width="240" height="140" fill="url(#thumb3)" rx="6"/>
      <text x="16" y="168" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Chá bíblico que acalma o</text>
      <text x="16" y="186" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">casamento · Receita antiga</text>
      <text x="16" y="214" font-family="Inter, Arial, sans-serif" font-size="10" fill="#6B7280">cosmeticonatural.net · Ad</text>
      <rect x="16" y="226" width="100" height="18" rx="9" fill="#7A1F3A"/>
      <text x="66" y="239" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#fff">Descobrir →</text>
    </g>
  </g>

  <text x="776" y="328" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#9CA3AF">slot-mid · placeholder</text>
</svg>
