server_tokens off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ============= Security headers (apply to ALL responses) =============
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CSP — permissivo o suficiente pra MGID widget e vídeo Bunny CDN funcionarem
    # 'unsafe-inline' em style/script é necessário pro Astro (inline styles + hidratação)
    set $csp "default-src 'self'; ";
    set $csp "${csp}script-src 'self' 'unsafe-inline' https://jsc.adskeeper.com https://*.adskeeper.com https://*.mgid.com https://identity.netlify.com; ";
    set $csp "${csp}style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; ";
    set $csp "${csp}font-src 'self' data: https://fonts.gstatic.com; ";
    set $csp "${csp}img-src 'self' data: blob: https://*.adskeeper.com https://*.mgid.com https://servicer.mgid.com https://*.maxfem.com.br https://img.shields.io https://iframe.mediadelivery.net; ";
    set $csp "${csp}connect-src 'self' https://*.adskeeper.com https://*.mgid.com https://servicer.mgid.com; ";
    set $csp "${csp}frame-src 'self' https://iframe.mediadelivery.net https://*.mediadelivery.net https://*.adskeeper.com https://*.mgid.com; ";
    set $csp "${csp}object-src 'none'; ";
    set $csp "${csp}base-uri 'self'; ";
    set $csp "${csp}form-action 'self'; ";
    set $csp "${csp}frame-ancestors 'self';";
    add_header Content-Security-Policy $csp always;

    # ============= Bloqueios — paths sensíveis retornam 404 sem servir nada =============
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; return 404; }
    location ~* /\.(env|git|svn|hg|DS_Store|htaccess|htpasswd) { deny all; return 404; }
    location ~* /(node_modules|src|\.vscode|package(-lock)?\.json|tsconfig|astro\.config|nginx\.conf|Dockerfile)(/|$) {
        deny all; return 404;
    }
    location ~* /wp-(login|admin|content|includes)(/|$) { return 404; }
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 404; }

    # ============= Cache pra estáticos =============
    # NOTE: nginx zera os add_header herdados quando um location declara
    # qualquer add_header próprio. Por isso usamos só `expires` aqui (que
    # gera Cache-Control automaticamente) — assim os headers de segurança
    # do escopo `server` continuam aplicados.
    location ~* \.(woff2|woff|ttf|otf)$ {
        expires 1y;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
    }

    # ============= Roteamento — 404 real fora dos paths conhecidos =============
    error_page 404 /404.html;
    location = /404.html { internal; }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
